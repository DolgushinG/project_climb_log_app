name: Flutter CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.4'
          channel: 'stable'
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --no-pub --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

      - name: Notify ntfy — tests failed
        if: failure()
        env:
          NTFY_TOPIC: ${{ vars.NTFY_TOPIC }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC not set, skip notify"
            exit 0
          fi
          COMMIT="${GITHUB_SHA:0:7}"
          MSG="❌ Tests failed
          Ветка: ${{ github.ref_name }}
          Commit: ${COMMIT}"
          MSG=$(echo "$MSG" | sed 's/^[[:space:]]*//')
          curl -sf -X POST "https://ntfy.sh/${NTFY_TOPIC}" \
            -H "Title: PROD tests failed" \
            -d "${MSG}" || true
