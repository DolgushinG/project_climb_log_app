name: Deploy Flutter Web

on:
  workflow_run:
    workflows: ["Flutter CI"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Bump web cache version
        run: ./scripts/web_version_bump.sh

      - name: Build web
        run: flutter build web --release --no-web-resources-cdn

      # Убирает //# sourceMappingURL=flutter.js.map — Flutter не генерирует .map, браузер получает 404 (HTML) → JSON Parse error.
      - name: Strip source map references
        run: ./scripts/web_strip_sourcemaps.sh

      # Flutter build web не копирует web/premium/ — страницы success/fail для postMessage из iframe.
      # Без них PayAnyWay редирект на /premium/success не загружает нужный HTML, postMessage не срабатывает.
      - name: Copy premium success/fail pages
        run: |
          mkdir -p build/web/premium/success build/web/premium/fail
          cp web/premium/success/index.html build/web/premium/success/
          cp web/premium/fail/index.html build/web/premium/fail/

      - name: Copy test-runner page
        run: |
          mkdir -p build/web/test-runner
          cp web/test-runner/index.html build/web/test-runner/

      - name: Deploy to server
        id: deploy
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          TARGET="${DEPLOY_PATH:-/var/www/app.climbing-events.ru}"
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" -p "$PORT" >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p $PORT" \
            build/web/ "$DEPLOY_USER@$DEPLOY_HOST:$TARGET/"

      - name: Notify ntfy — tests + deploy result
        if: always()
        env:
          NTFY_TOPIC: ${{ vars.NTFY_TOPIC }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC not set, skip notify"
            exit 0
          fi
          COMMIT="${GITHUB_SHA:0:7}"
          DEPLOY_OUTCOME="${{ steps.deploy.outcome }}"
          if [ "$DEPLOY_OUTCOME" = "success" ]; then
            MSG="✅ Tests passed, deploy OK
          Ветка: ${{ github.ref_name }}
          Commit: ${COMMIT}
          Деплой выполнен."
          else
            MSG="❌ Tests passed, deploy failed
          Ветка: ${{ github.ref_name }}
          Commit: ${COMMIT}"
          fi
          MSG=$(echo "$MSG" | sed 's/^[[:space:]]*//')
          curl -sf -X POST "https://ntfy.sh/${NTFY_TOPIC}" \
            -H "Title: PROD tests+deploy ${{ steps.deploy.outcome }}" \
            -d "${MSG}" || true
